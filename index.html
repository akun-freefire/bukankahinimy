<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledakan Cinta untukmu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a000d; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ff4d6d;
            overflow: hidden;
            transition: background 2s ease;
        }

        body.firework-bg {
            background: #0a0010; 
        }

        body.after-firework {
            background: #fff0f3; 
        }

        .container {
            text-align: center;
            backdrop-filter: blur(5px);
            padding: 40px 30px;
            border-radius: 30px;
            max-width: 90%;
            width: 480px;
            z-index: 20;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.8s ease;
            /* border dihapus */
            position: relative;
        }

        .container.show {
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 10px;
            color: #c9184a;
            text-shadow: 2px 2px 0 #ffb3c6;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #590d22;
            margin: 15px 0;
        }

        .heart-icon {
            color: #ff4d6d;
            font-size: 30px;
            animation: beat 0.8s infinite alternate;
            transform-origin: center;
            display: inline-block;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ff8fa3;
            margin: 0 auto 20px auto;
            overflow: hidden;
            box-shadow: 0 10px 25px #ff4d6d80;
            background: #ffe6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #a4133c;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #ffccd5;
            color: #800f2f;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
            padding: 10px;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 1.5s;
        }

        .floating-hearts.show {
            opacity: 1;
        }

        .floating-heart {
            position: absolute;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 77, 109, 0.4);
            animation: floatUp 15s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        .credit {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ff8fa3;
        }
    </style>
</head>
<body id="mainBody" class="firework-bg">

    <canvas id="fireworks-canvas"></canvas>

    <ul class="floating-hearts" id="floatingHearts">
        <li class="floating-heart" style="left: 15%; width: 80px; height: 80px; animation-delay: 0s;"></li>
        <li class="floating-heart" style="left: 80%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s;"></li>
        <li class="floating-heart" style="left: 30%; width: 45px; height: 45px; animation-delay: 4s; animation-duration: 18s;"></li>
        <li class="floating-heart" style="left: 60%; width: 25px; height: 25px; animation-delay: 1s;"></li>
        <li class="floating-heart" style="left: 70%; width: 60px; height: 60px; animation-delay: 5s; animation-duration: 14s;"></li>
        <li class="floating-heart" style="left: 45%; width: 100px; height: 100px; animation-delay: 3s; animation-duration: 20s;"></li>
    </ul>

    <div class="container" id="messageCard">
        <div class="photo-frame" id="photoContainer">
            <img src="cantik.jpg" alt="Foto Cantik" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" style="display: block;">
            <div class="photo-placeholder" style="display: none; width:100%; height:100%;">
                📸 cantik.jpg<br>(tidak ditemukan)
            </div>
        </div>
        <div class="heart-icon">❤️</div>
        <div class="heart-icon">❤️</div>
        <div class="heart-icon">❤️</div>
        <h1>Halo Cantik!</h1>
        <p>Cuma mau bilang kalau kamu adalah hal tercantik yang pernah hadir di hidupku. <br> 
           Terima kasih sudah selalu jadi alasan aku tersenyum hari ini.</p>
        <p><strong>I Love You So Much!</strong></p>
        <div class="credit"></div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            const body = document.getElementById('mainBody');
            const messageCard = document.getElementById('messageCard');
            const floatingHearts = document.getElementById('floatingHearts');

            let width, height;
            let particles = [];
            const MAX_PARTICLES = 300;
            let animationFrame = null;
            let fireworksActive = true; 
            let finalHeartExploded = false; 

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function random(min, max) {
                return Math.random() * (max - min) + min;
            }

            class Particle {
                constructor(x, y, color, vx, vy, size, life, shape = 'circle') {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.size = size;
                    this.life = life;
                    this.maxLife = life;
                    this.shape = shape; 
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.02;
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                    this.life -= 1;
                }

                draw(ctx) {
                    if (this.life <= 0) return;
                    const opacity = Math.min(1, this.life / this.maxLife);
                    ctx.globalAlpha = opacity;
                    
                    if (this.shape === 'heart' && this.size > 3) {
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.scale(this.size / 15, this.size / 15); 
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.moveTo(0, 5);
                        ctx.bezierCurveTo(-5, -2, -10, -5, 0, -10);
                        ctx.bezierCurveTo(10, -5, 5, -2, 0, 5);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * (this.life / this.maxLife), 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }
                }
            }

            function createExplosion(x, y, colorBase = null, count = 30) {
                const baseColor = colorBase || `hsl(${random(0, 360)}, 100%, 65%)`;
                for (let i = 0; i < count; i++) {
                    const angle = random(0, Math.PI * 2);
                    const speed = random(1, 5);
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const size = random(3, 8);
                    const life = random(60, 100);
                    const color = `hsl(${random(330, 370)}, 90%, 70%)`;
                    particles.push(new Particle(x, y, color, vx, vy, size, life, 'circle'));
                }
            }

            function createHeartExplosion(x, y) {
                const count = 180; 
                for (let i = 0; i < count; i++) {
                    const t = Math.random() * Math.PI * 2;
                    const scale = random(2, 5) * 3; 
                    const xOffset = 16 * Math.pow(Math.sin(t), 3) * scale * 0.6;
                    const yOffset = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * scale * 0.6;
                    
                    const targetX = x + xOffset + random(-10, 10);
                    const targetY = y + yOffset + random(-10, 10);
                    
                    const dx = targetX - x;
                    const dy = targetY - y;
                    const dist = Math.hypot(dx, dy);
                    const speed = dist * 0.08; 
                    
                    const vx = (dx / dist) * speed + random(-0.5, 0.5);
                    const vy = (dy / dist) * speed + random(-0.5, 0.5);
                    
                    const size = random(4, 12);
                    const life = random(130, 200);
                    const hue = random(330, 20); 
                    const color = `hsl(${hue}, 100%, 65%)`;
                    
                    const shape = (Math.random() < 0.25) ? 'heart' : 'circle';
                    
                    particles.push(new Particle(x, y, color, vx, vy, size, life, shape));
                }
            }

            let stage = 0;
            function startFireworks() {
                setTimeout(() => {
                    if (!fireworksActive) return;
                    createExplosion(width/2, height/2, '#ff99c8', 40);
                }, 200);
                
                setTimeout(() => {
                    if (!fireworksActive) return;
                    createExplosion(width*0.3, height*0.4, '#f6d5f7', 35);
                }, 600);

                setTimeout(() => {
                    if (!fireworksActive) return;
                    createExplosion(width*0.7, height*0.6, '#a2d6f9', 35);
                }, 1100);

                setTimeout(() => {
                    if (!fireworksActive) return;
                    for (let i=0; i<2; i++) {
                        setTimeout(() => {
                            createHeartExplosion(width/2 + random(-40,40), height/2 + random(-30,30));
                        }, i*150);
                    }
                    setTimeout(() => {
                        createHeartExplosion(width/2, height/2-20);
                        createHeartExplosion(width/2+30, height/2+10);
                        createHeartExplosion(width/2-30, height/2+10);
                        
                        setTimeout(() => {
                            fireworksActive = false; 
                            finalHeartExploded = true;

                            body.classList.remove('firework-bg');
                            body.classList.add('after-firework');

                            messageCard.classList.add('show');

                            floatingHearts.classList.add('show');

                            canvas.style.transition = 'opacity 1.5s';
                            canvas.style.opacity = '0';

                            setTimeout(() => {
                                particles = [];
                                if (animationFrame) {
                                    cancelAnimationFrame(animationFrame);
                                    animationFrame = null;
                                }
                            }, 1500);
                        }, 1800); 
                    }, 300);
                }, 2000);
            }

            function animate() {
                if (!fireworksActive && particles.length === 0) {
                    if (animationFrame) {
                        cancelAnimationFrame(animationFrame);
                        animationFrame = null;
                    }
                    return;
                }

                ctx.clearRect(0, 0, width, height);

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    } else {
                        p.draw(ctx);
                    }
                }

                if (particles.length > MAX_PARTICLES) {
                    particles = particles.slice(0, MAX_PARTICLES);
                }

                animationFrame = requestAnimationFrame(animate);
            }

            animate();
            startFireworks();

            window.addEventListener('beforeunload', function() {
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                }
            });

            const photoContainer = document.getElementById('photoContainer');
            const img = photoContainer.querySelector('img');
            const placeholder = photoContainer.querySelector('.photo-placeholder');
            if (img) {
                img.onerror = function() {
                    img.style.display = 'none';
                    placeholder.style.display = 'flex';
                };
                img.onload = function() {
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                };
            }
        })();
    </script>
</body>
</html>
