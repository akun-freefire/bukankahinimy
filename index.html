<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>for my girl</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff0f3;
            font-family: 'Georgia', 'Times New Roman', serif;
            transition: background 2s ease;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* HAPUS semua gaya floating-hearts & falling-photo */
        .floating-hearts, .falling-photo {
            display: none;
        }

        .container {
            width: min(800px, 95%);
            min-height: min(600px, 80vh);
            background: rgba(255, 246, 232, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 30;
            opacity: 1;
            transform: scale(1) translateY(0);
            transition: opacity 0.7s ease, transform 0.6s ease;
            border: 2px solid #ffb6c1;
            margin: 20px auto;
        }

        .container.hidden {
            display: none !important;
        }

        .content {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #3a281d;
            line-height: 1.6;
            gap: 15px;
        }

        /* Proteksi foto - mencegah interaksi */
        .photo-frame, .photo-frame-mini, .signature-circle, .certificate-frame {
            pointer-events: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .photo-frame::after, .photo-frame-mini::after, .signature-circle::after, .certificate-frame::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 2;
        }

        .photo-frame {
            width: min(180px, 35%);
            max-width: 200px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 5px solid #dcb185;
            overflow: hidden;
            background: #edd7bb;
            box-shadow: 0 8px 25px #c07d5c80;
            margin: 10px auto;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .photo-frame img, .photo-frame-mini img, .signature-circle img, .certificate-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
        }

        /* ===== SERTIFIKAT DENGAN UKURAN 2000x1414 ===== */
        .certificate-frame {
            width: 100%;
            max-width: 1000px; /* Lebih besar untuk layar lebar */
            aspect-ratio: 2000/1414; /* Rasio persis 2000:1414 */
            border-radius: 20px;
            border: 5px solid #d4af37;
            overflow: hidden;
            background: #f5e7d3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 20px auto;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .certificate-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Seluruh gambar terlihat tanpa terpotong */
            object-position: center;
            background: #f5e7d3;
        }

        /* Responsif untuk berbagai ukuran layar */
        @media (min-width: 1400px) {
            .certificate-frame {
                max-width: 1200px;
            }
        }

        @media (min-width: 1200px) and (max-width: 1399px) {
            .certificate-frame {
                max-width: 1000px;
            }
        }

        @media (min-width: 992px) and (max-width: 1199px) {
            .certificate-frame {
                max-width: 900px;
            }
        }

        @media (min-width: 768px) and (max-width: 991px) {
            .certificate-frame {
                max-width: 700px;
                border-width: 4px;
            }
        }

        @media (max-width: 767px) {
            .certificate-frame {
                max-width: 95%;
                border-width: 3px;
                border-radius: 15px;
            }
        }

        @media (max-width: 480px) {
            .certificate-frame {
                max-width: 98%;
                border-radius: 12px;
                border-width: 3px;
            }
        }

        .photo-placeholder, .photo-placeholder-mini, .signature-placeholder, .certificate-placeholder {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            -webkit-user-drag: none;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8cfb0;
            color: #8b4e2e;
            font-size: 1rem;
        }

        .certificate-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #f5e7d3;
            color: #ac3f5c;
            font-size: clamp(1.2rem, 4vw, 2rem);
            text-align: center;
            padding: 20px;
        }

        .heart-icon {
            font-size: 35px;
            color: #d65374;
            display: inline-block;
            animation: gentleBeat 1.8s infinite;
        }

        @keyframes gentleBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: #ac3f5c;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #f9cfb2;
            margin: 10px 0 5px;
        }

        h2 {
            font-size: clamp(1.4rem, 5vw, 2rem);
            color: #a14f6a;
            margin-bottom: 10px;
        }

        .poem, .letter {
            background: rgba(253, 242, 228, 0.9);
            padding: 25px 20px;
            border-radius: 30px 8px 30px 8px;
            border-left: 5px solid #df8faa;
            max-width: 95%;
            margin: 15px auto;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            box-shadow: 0 6px 12px rgba(150, 100, 50, 0.15);
            white-space: pre-line;
            width: 100%;
        }

        .letter {
            font-family: 'Courier New', monospace;
            border-left-color: #b98262;
            background: #fef7e9;
        }

        .photo-strip {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 20px;
            margin: 15px 0;
        }

        .photo-item {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .photo-item:nth-child(odd) { flex-direction: row; }
        .photo-item:nth-child(even) { flex-direction: row-reverse; }

        .photo-frame-mini {
            flex: 0 0 100px;
            height: 100px;
            border-radius: 25px 6px 25px 6px;
            border: 3px solid #d7aa7a;
            overflow: hidden;
            background: #f0d2b2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .photo-frame-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder-mini {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e5c7a2;
            color: #795d40;
            font-size: 1rem;
        }

        .caption-text {
            flex: 1;
            background: #fcf1e2;
            padding: 15px;
            border-radius: 18px 4px 18px 4px;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            text-align: left;
            border-left: 4px solid #dc8da5;
            box-shadow: inset 0 1px 8px #ffe6d3;
            word-break: break-word;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 30px;
            padding: 0 10px;
        }

        .nav-btn {
            background: #dbb48b;
            border: none;
            color: #3b281d;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 3px solid #f7e3c7;
        }

        .nav-btn:active {
            transform: scale(0.9);
            background: #c69664;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .page-indicator {
            font-size: 1.1rem;
            color: #ac3f5c;
            background: #fff0e6;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: inset 0 1px 5px #ffd9c0;
        }

        /* Tombol container untuk download dan selesai */
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
            width: 100%;
        }

        .finish-btn {
            background: #d48b9c;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #f9cfb2;
            font-weight: bold;
            letter-spacing: 2px;
            min-width: 200px;
        }

        .finish-btn:active {
            transform: scale(0.95);
            background: #b86f82;
        }

        .download-btn {
            background: #8ba3c7;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #f9cfb2;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
            justify-content: center;
        }

        .download-btn i {
            font-size: 1.8rem;
        }

        .download-btn:active {
            transform: scale(0.95);
            background: #6a7fa0;
        }

        .download-btn:hover {
            background: #7a97c2;
        }

        .finish-btn:hover {
            background: #c47a8b;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 600px) {
            .action-buttons {
                flex-direction: column;
                gap: 15px;
            }
            
            .finish-btn, .download-btn {
                font-size: 1.2rem;
                padding: 12px 25px;
                min-width: 180px;
                width: 100%;
                max-width: 280px;
            }
            
            .download-btn i {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 380px) {
            .finish-btn, .download-btn {
                font-size: 1rem;
                padding: 10px 20px;
                min-width: 150px;
            }
        }

        .signature-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px;
        }

        .signature-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .signature-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .signature-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: transparent;
            color: #ac3f5c;
            font-size: 1.2rem;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        img::selection {
            background: transparent;
        }

        img::-moz-selection {
            background: transparent;
        }

        .no-context {
            pointer-events: none;
        }

        /* ===== REELS STYLE - DIPERBAIKI: SCROLL LEBIH SMOOTH & RESPONSIF ===== */
        #reels-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #000;
            display: block;
            overflow: hidden;
        }

        .reels-wrapper {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: #000;
            /* Smooth scroll behavior */
            scroll-behavior: smooth;
            scroll-snap-stop: always;
            /* Optimasi performa */
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            will-change: transform, scroll-position;
        }

        .reels-wrapper::-webkit-scrollbar {
            display: none;
        }

        .reel-slide {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Animasi fade saat muncul */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0.7;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
            pointer-events: none;
            /* Optimasi video */
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        /* ===== RESPONSIF OVERLAY REELS ===== */
        .reel-overlay {
            position: absolute;
            bottom: 24%;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: min(20px, 3vh);
            color: white;
            z-index: 1010;
            pointer-events: none;
            align-items: center;
        }

        .reel-overlay div {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            gap: min(5px, 1vh);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .reel-overlay div i {
            font-size: clamp(1.5rem, 5vw, 2rem);
            filter: drop-shadow(0 2px 5px black);
        }

        .reel-user-info {
            position: absolute;
            bottom: 24%;
            left: 15px;
            color: white;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            text-shadow: 0 2px 8px black;
            display: flex;
            align-items: center;
            gap: min(10px, 2vw);
            pointer-events: none;
            z-index: 1010;
        }

        .reel-user-info .avatar {
            width: min(40px, 8vw);
            height: min(40px, 8vw);
            border-radius: 50%;
            background: #ffb6c1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel-user-info .avatar i {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: #fff;
        }

        /* ===== CAPTION RESPONSIF ===== */
        .reel-caption {
            position: absolute;
            bottom: clamp(5%, 8%, 10%);
            left: 15px;
            right: 15px;
            color: white;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            text-shadow: 0 2px 8px black;
            background: transparent;
            padding: clamp(5px, 1.5vh, 8px) clamp(5px, 2vw, 10px);
            z-index: 1009;
            pointer-events: none;
            line-height: 1.4;
            max-width: min(800px, 100% - 30px);
            margin: 0 auto;
            word-break: break-word;
            white-space: pre-wrap;
            font-weight: 400;
            text-align: left;
            border: none;
            backdrop-filter: none;
            /* Optimasi untuk mobile */
            -webkit-font-smoothing: antialiased;
        }

        .reel-slide * {
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Responsif untuk berbagai ukuran layar */
        @media (max-height: 600px) {
            .reel-overlay { 
                bottom: 15%; 
                gap: 10px;
            }
            .reel-user-info { 
                bottom: 15%; 
            }
            .reel-caption { 
                bottom: 5%; 
                font-size: 0.8rem;
                line-height: 1.3;
            }
            .reel-overlay div i {
                font-size: 1.5rem;
            }
        }

        @media (max-height: 400px) {
            .reel-caption {
                bottom: 3%;
                font-size: 0.7rem;
                line-height: 1.2;
            }
        }

        @media (min-height: 800px) {
            .reel-caption { 
                bottom: 8%; 
            }
        }

        @media (min-width: 768px) {
            .reel-caption {
                font-size: 1rem;
                left: 20px;
                right: 20px;
            }
        }

        @media (min-width: 1024px) {
            .reel-caption {
                font-size: 1.1rem;
                left: 30px;
                right: 30px;
                max-width: 60%;
            }
        }

        /* Landscape mode */
        @media (orientation: landscape) and (max-height: 500px) {
            .reel-overlay {
                bottom: 10%;
                right: 10px;
                gap: 8px;
            }
            .reel-user-info {
                bottom: 10%;
                left: 10px;
            }
            .reel-caption {
                bottom: 3%;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

    <script>
        (function() {
            // ========== PROTEKSI GAMBAR ==========
            document.addEventListener('dragstart', function(e) {
                if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
                    e.preventDefault();
                    return false;
                }
            });
            
            document.addEventListener('contextmenu', function(e) {
                if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO' || 
                    e.target.closest('.photo-frame') || e.target.closest('.photo-frame-mini') || 
                    e.target.closest('.signature-circle') || e.target.closest('.certificate-frame') || 
                    e.target.closest('.reel-slide')) {
                    e.preventDefault();
                    return false;
                }
            });
            
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); return false; }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
                if ((e.ctrlKey || e.metaKey) && e.key === 'u') { e.preventDefault(); return false; }
                if (e.key === 'F12') { e.preventDefault(); return false; }
                if (e.key === 'PrintScreen') { 
                    e.preventDefault(); 
                    return false; 
                }
            });

            const contentArea = document.getElementById('contentArea');

            const reelsContainer = document.getElementById('reels-container');
            
            let currentPage = 1;
            const totalPages = 7;

            const pages = [
                // Halaman 1
                `

                `,

                `,
                // Halaman 3
                `

                // Halaman 7 - DENGAN TOMBOL DOWNLOAD
                `
                    <h2>🏆 Sertifikat Penghargaan 🏆</h2>
                    <div class="certificate-frame">
                        <img src="sertifikat.jpg" alt="sertifikat penghargaan" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

            ];

            function updatePage() {
                contentArea.innerHTML = pages[currentPage - 1];
                pageIndicator.textContent = `${currentPage} / ${totalPages}`;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            }

            window.changePage = function(direction) {
                const newPage = currentPage + direction;
                if (newPage >= 1 && newPage <= totalPages) {
                    currentPage = newPage;
                    updatePage();
                }
            };

            updatePage();

            // ========== FUNGSI DOWNLOAD SERTIFIKAT ==========
            window.downloadCertificate = function() {
                const link = document.createElement('a');
                link.href = 'sertifikat.jpg';
                link.download = 'sertifikat_penghargaan.jpg';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                alert('Sertifikat sedang didownload!');
            };

            // ========== FUNGSI SMOOTH SCROLL UNTUK REELS ==========
            function setupSmoothScroll() {
                const reelsWrapper = document.querySelector('.reels-wrapper');
                if (!reelsWrapper) return;
                
                let isScrolling = false;
                let scrollTimeout;
                let touchStartY = 0;
                let touchEndY = 0;
                let isTouching = false;
                
                // Smooth scroll dengan wheel event
                reelsWrapper.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    
                    if (isScrolling) return;
                    
                    isScrolling = true;
                    
                    const delta = e.deltaY > 0 ? 1 : -1;
                    const currentScroll = reelsWrapper.scrollTop;
                    const slideHeight = window.innerHeight;
                    const targetSlide = Math.round(currentScroll / slideHeight) + delta;
                    const targetScroll = targetSlide * slideHeight;
                    
                    // Batasi scroll
                    const maxScroll = (reelsWrapper.children.length - 1) * slideHeight;
                    const validTargetScroll = Math.max(0, Math.min(targetScroll, maxScroll));
                    
                    // Smooth scroll animation
                    function smoothScroll() {
                        const currentScrollPos = reelsWrapper.scrollTop;
                        const distance = validTargetScroll - currentScrollPos;
                        const step = distance * 0.12; // Kecepatan scroll (lebih lambat = lebih smooth)
                        
                        if (Math.abs(step) > 0.5) {
                            reelsWrapper.scrollTop = currentScrollPos + step;
                            requestAnimationFrame(smoothScroll);
                        } else {
                            reelsWrapper.scrollTop = validTargetScroll;
                            setTimeout(() => {
                                isScrolling = false;
                            }, 100);
                        }
                    }
                    
                    requestAnimationFrame(smoothScroll);
                    
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(() => {
                        isScrolling = false;
                    }, 300);
                    
                }, { passive: false });
                
                // Touch events untuk mobile
                reelsWrapper.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                    isTouching = true;
                }, { passive: true });
                
                reelsWrapper.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                }, { passive: false });
                
                reelsWrapper.addEventListener('touchend', (e) => {
                    if (!isTouching || isScrolling) return;
                    
                    touchEndY = e.changedTouches[0].clientY;
                    const delta = touchStartY - touchEndY;
                    
                    if (Math.abs(delta) > 30) {
                        isScrolling = true;
                        
                        const direction = delta > 0 ? 1 : -1;
                        const currentScroll = reelsWrapper.scrollTop;
                        const slideHeight = window.innerHeight;
                        const targetSlide = Math.round(currentScroll / slideHeight) + direction;
                        const targetScroll = targetSlide * slideHeight;
                        
                        const maxScroll = (reelsWrapper.children.length - 1) * slideHeight;
                        const validTargetScroll = Math.max(0, Math.min(targetScroll, maxScroll));
                        
                        function smoothTouchScroll() {
                            const currentScrollPos = reelsWrapper.scrollTop;
                            const distance = validTargetScroll - currentScrollPos;
                            const step = distance * 0.12;
                            
                            if (Math.abs(step) > 0.5) {
                                reelsWrapper.scrollTop = currentScrollPos + step;
                                requestAnimationFrame(smoothTouchScroll);
                            } else {
                                reelsWrapper.scrollTop = validTargetScroll;
                                setTimeout(() => {
                                    isScrolling = false;
                                }, 100);
                            }
                        }
                        
                        requestAnimationFrame(smoothTouchScroll);
                        
                        setTimeout(() => {
                            isScrolling = false;
                        }, 300);
                    }
                    
                    isTouching = false;
                }, { passive: true });
                
                // Keyboard navigation
                window.addEventListener('keydown', (e) => {
                    if (reelsContainer.style.display !== 'block') return;
                    
                    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        
                        if (isScrolling) return;
                        
                        isScrolling = true;
                        
                        const direction = e.key === 'ArrowDown' ? 1 : -1;
                        const currentScroll = reelsWrapper.scrollTop;
                        const slideHeight = window.innerHeight;
                        const targetSlide = Math.round(currentScroll / slideHeight) + direction;
                        const targetScroll = targetSlide * slideHeight;
                        
                        const maxScroll = (reelsWrapper.children.length - 1) * slideHeight;
                        const validTargetScroll = Math.max(0, Math.min(targetScroll, maxScroll));
                        
                        function smoothKeyScroll() {
                            const currentScrollPos = reelsWrapper.scrollTop;
                            const distance = validTargetScroll - currentScrollPos;
                            const step = distance * 0.12;
                            
                            if (Math.abs(step) > 0.5) {
                                reelsWrapper.scrollTop = currentScrollPos + step;
                                requestAnimationFrame(smoothKeyScroll);
                            } else {
                                reelsWrapper.scrollTop = validTargetScroll;
                                setTimeout(() => {
                                    isScrolling = false;
                                }, 100);
                            }
                        }
                        
                        requestAnimationFrame(smoothKeyScroll);
                        
                        setTimeout(() => {
                            isScrolling = false;
                        }, 300);
                    }
                });
            }

            // ========== REELS DENGAN 10 VIDEO ==========
            const bgMusic = document.getElementById('bg-music');
            const bgMusic2 = document.getElementById('bg-music2');
            bgMusic2.volume = 0.35;
            bgMusic2.loop = true;

            const videoFiles = [
                'imut1.mp4', 'imut2.mp4', 'imut3.mp4', 'imut4.mp4', 'imut5.mp4',
                'imut6.mp4', 'imut7.mp4', 'imut8.mp4', 'imut9.mp4', 'imut10.mp4'
            ];

            const rawCaption = "Ini wanitaku, aku tau dia bukan perempuan yang kuat, namun dia selalu berusaha agar dia bisa ngelewatin semua masalahnya. dan dia adalah wanitaku. aku yang mempunyai dia seutuhnya, aku selalu bangga padanya, dan dia adalah sosok wanita yang paling aku sayangi setelah ibuku. dan dia adalah wanita.. favoritku.";

            function formatCaptionFiveWords(text) {
                const words = text.split(' ');
                const lines = [];
                for (let i = 0; i < words.length; i += 15) {
                    lines.push(words.slice(i, i + 15).join(' '));
                }
                return lines.join('\n');
            }

            const formattedCaption = formatCaptionFiveWords(rawCaption);

            window.finishAndStartReels = function() {
                mainContainer.classList.add('hidden');
                reelsContainer.style.display = 'block';
                
                bgMusic.pause();
                bgMusic.currentTime = 0;
                
                reelsContainer.innerHTML = ''; 

                const reelsWrapper = document.createElement('div');
                reelsWrapper.className = 'reels-wrapper';

                const totalSlides = 20;
                for (let i = 0; i < totalSlides; i++) {
                    const videoIndex = i % 10;
                    const slide = document.createElement('div');
                    slide.className = 'reel-slide';

                    const video = document.createElement('video');
                    video.className = 'reel-video';
                    video.src = videoFiles[videoIndex];
                    video.loop = true;
                    video.muted = true;
                    video.playsInline = true;
                    video.preload = 'auto';
                    video.setAttribute('playsinline', '');
                    video.setAttribute('webkit-playsinline', '');
                    
                    slide.appendChild(video);

                    const overlay = document.createElement('div');
                    overlay.className = 'reel-overlay';
                    overlay.innerHTML = `
                        <div><i class="fas fa-heart"></i> <span>1.2M</span></div>
                        <div><i class="fas fa-comment"></i> <span>8.4K</span></div>
                        <div><i class="fas fa-share"></i> <span>Share</span></div>
                    `;
                    slide.appendChild(overlay);

                    const userInfo = document.createElement('div');
                    userInfo.className = 'reel-user-info';
                    userInfo.innerHTML = `
                        <div class="avatar"><i class="fas fa-user-circle"></i></div>
                        <div><strong>@sayangkuuu</strong> • follow</div>
                    `;
                    slide.appendChild(userInfo);

                    const captionDiv = document.createElement('div');
                    captionDiv.className = 'reel-caption';
                    captionDiv.textContent = formattedCaption;
                    slide.appendChild(captionDiv);

                    reelsWrapper.appendChild(slide);
                }

                reelsContainer.appendChild(reelsWrapper);

                // Setup smooth scroll setelah reels dibuat
                setTimeout(() => {
                    setupSmoothScroll();
                }, 100);

                const videos = reelsContainer.querySelectorAll('.reel-video');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target;
                        if (entry.isIntersecting) {
                            video.play().catch(e => console.log('Autoplay muted'));
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.5 });

                videos.forEach(v => observer.observe(v));

                setTimeout(() => {
                    const firstVideo = reelsContainer.querySelector('.reel-video');
                    if (firstVideo) {
                        firstVideo.play().catch(e => console.log('Gagal autoplay pertama'));
                    }
                }, 500);

                bgMusic2.play()
                    .then(() => console.log('Musik 2 dimulai'))
                    .catch(e => {
                        console.log('Gagal autoplay musik 2');
                        const playMusic2 = function() {
                            bgMusic2.play().catch(() => {});
                            document.body.removeEventListener('click', playMusic2);
                            document.body.removeEventListener('touchstart', playMusic2);
                        };
                        document.body.addEventListener('click', playMusic2, { once: true });
                        document.body.addEventListener('touchstart', playMusic2, { once: true });
                    });
            };

            // Putar musik pertama
            const playFirstMusic = function() {
                bgMusic.volume = 0.4;
                bgMusic.loop = true;
                bgMusic.play()
                    .then(() => {
                        console.log('Musik 1 berhasil diputar');
                    })
                    .catch(e => {
                        console.log('Gagal memutar musik 1, coba interaksi');
                    });
            };

            setTimeout(playFirstMusic, 500);
            
            const playOnInteraction = function() {
                bgMusic.play().catch(() => {});
                document.body.removeEventListener('click', playOnInteraction);
                document.body.removeEventListener('touchstart', playOnInteraction);
            };
            
            document.body.addEventListener('click', playOnInteraction, { once: true });
            document.body.addEventListener('touchstart', playOnInteraction, { once: true });

        })();
    </script>
