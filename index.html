<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Buat Cewek Tercantik ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a000d;
            font-family: 'Georgia', 'Times New Roman', serif;
            transition: background 2s ease;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body.firework-bg {
            background: #0a0010;
        }

        body.after-firework {
            background: #fff0f3;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .floating-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 1.5s;
        }

        .floating-hearts.show {
            opacity: 0.25;
        }

        .floating-heart {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 120, 160, 0.2);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .container {
            width: min(800px, 95%);
            min-height: min(600px, 80vh);
            background: rgba(255, 246, 232, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 30;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: opacity 0.7s ease, transform 0.6s ease;
            border: 2px solid #ffb6c1;
            margin: 20px auto;
        }

        .container.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .content {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #3a281d;
            line-height: 1.6;
            gap: 15px;
        }

        /* Proteksi foto - mencegah interaksi */
        .photo-frame, .photo-frame-mini, .signature-circle {
            pointer-events: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Overlay transparan untuk mencegah klik kanan */
        .photo-frame::after, .photo-frame-mini::after, .signature-circle::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 2;
        }

        .photo-frame {
            width: min(180px, 35%);
            max-width: 200px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 5px solid #dcb185;
            overflow: hidden;
            background: #edd7bb;
            box-shadow: 0 8px 25px #c07d5c80;
            margin: 10px auto;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .photo-frame img, .photo-frame-mini img, .signature-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            -webkit-touch-callout: none;
        }

        /* Nonaktifkan drag untuk placeholder */
        .photo-placeholder, .photo-placeholder-mini, .signature-placeholder {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8cfb0;
            color: #8b4e2e;
            font-size: 1rem;
        }

        .heart-icon {
            font-size: 35px;
            color: #d65374;
            display: inline-block;
            animation: gentleBeat 1.8s infinite;
        }

        @keyframes gentleBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: #ac3f5c;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #f9cfb2;
            margin: 10px 0 5px;
        }

        h2 {
            font-size: clamp(1.4rem, 5vw, 2rem);
            color: #a14f6a;
            margin-bottom: 10px;
        }

        .poem, .letter {
            background: rgba(253, 242, 228, 0.9);
            padding: 25px 20px;
            border-radius: 30px 8px 30px 8px;
            border-left: 5px solid #df8faa;
            max-width: 95%;
            margin: 15px auto;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            box-shadow: 0 6px 12px rgba(150, 100, 50, 0.15);
            white-space: pre-line;
            width: 100%;
        }

        .letter {
            font-family: 'Courier New', monospace;
            border-left-color: #b98262;
            background: #fef7e9;
        }

        .photo-strip {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 20px;
            margin: 15px 0;
        }

        .photo-item {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .photo-item:nth-child(odd) { flex-direction: row; }
        .photo-item:nth-child(even) { flex-direction: row-reverse; }

        .photo-frame-mini {
            flex: 0 0 100px;
            height: 100px;
            border-radius: 25px 6px 25px 6px;
            border: 3px solid #d7aa7a;
            overflow: hidden;
            background: #f0d2b2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .photo-frame-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder-mini {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e5c7a2;
            color: #795d40;
            font-size: 1rem;
        }

        .caption-text {
            flex: 1;
            background: #fcf1e2;
            padding: 15px;
            border-radius: 18px 4px 18px 4px;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            text-align: left;
            border-left: 4px solid #dc8da5;
            box-shadow: inset 0 1px 8px #ffe6d3;
            word-break: break-word;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 30px;
            padding: 0 10px;
        }

        .nav-btn {
            background: #dbb48b;
            border: none;
            color: #3b281d;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 3px solid #f7e3c7;
        }

        .nav-btn:active {
            transform: scale(0.9);
            background: #c69664;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .page-indicator {
            font-size: 1.1rem;
            color: #ac3f5c;
            background: #fff0e6;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: inset 0 1px 5px #ffd9c0;
        }

        .signature-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px;
        }

        .signature-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .signature-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .signature-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: transparent;
            color: #ac3f5c;
            font-size: 1.2rem;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* Proteksi tambahan untuk mencegah highlight */
        img::selection {
            background: transparent;
        }

        img::-moz-selection {
            background: transparent;
        }

        /* Mencegah context menu */
        .no-context {
            pointer-events: none;
        }
    </style>
</head>
<body id="mainBody" class="firework-bg" oncontextmenu="return false;">

    <canvas id="fireworks-canvas"></canvas>

    <ul class="floating-hearts" id="floatingHearts">
        <li class="floating-heart" style="left:5%; width:70px; height:70px; animation-duration:14s;"></li>
        <li class="floating-heart" style="left:20%; width:50px; height:50px; animation-duration:16s; animation-delay:1s;"></li>
        <li class="floating-heart" style="left:85%; width:45px; height:45px; animation-duration:18s; animation-delay:2s;"></li>
        <li class="floating-heart" style="left:40%; width:90px; height:90px; animation-duration:22s;"></li>
        <li class="floating-heart" style="left:60%; width:30px; height:30px; animation-duration:12s; animation-delay:3s;"></li>
    </ul>

    <div class="container" id="mainContainer">
        <div class="content" id="contentArea"></div>
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">←</button>
            <span class="page-indicator" id="pageIndicator">1 / 6</span>
            <button class="nav-btn" id="nextBtn" onclick="changePage(1)">→</button>
        </div>
    </div>

    <!-- Audio -->
    <audio id="bg-music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
        <source src="music.ogg" type="audio/ogg">
    </audio>

    <!-- Overlay transparan untuk mencegah klik kanan dan drag -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; display: none;"></div>

    <script>
        (function() {
            // ========== PROTEKSI GAMBAR ==========
            
            // 1. Nonaktifkan drag and drop
            document.addEventListener('dragstart', function(e) {
                if (e.target.tagName === 'IMG') {
                    e.preventDefault();
                    return false;
                }
            });

            // 2. Nonaktifkan klik kanan
            document.addEventListener('contextmenu', function(e) {
                if (e.target.tagName === 'IMG' || e.target.closest('.photo-frame') || 
                    e.target.closest('.photo-frame-mini') || e.target.closest('.signature-circle')) {
                    e.preventDefault();
                    return false;
                }
            });

            // 3. Nonaktifkan keyboard shortcuts untuk save (Ctrl+S)
            document.addEventListener('keydown', function(e) {
                // Ctrl+S atau Cmd+S
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+Shift+I (DevTools)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+Shift+J (DevTools)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+U (View Source)
                if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                    e.preventDefault();
                    return false;
                }
                
                // F12 (DevTools)
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                
                // PrintScreen (tidak bisa sepenuhnya dicegah, tapi kita coba)
                if (e.key === 'PrintScreen') {
                    e.preventDefault();
                    return false;
                }
            });

            // 4. Nonaktifkan save image dari context menu
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            // 5. Nonaktifkan touch events untuk mencegah save di mobile
            document.addEventListener('touchstart', function(e) {
                if (e.target.tagName === 'IMG' || e.target.closest('.photo-frame') || 
                    e.target.closest('.photo-frame-mini') || e.target.closest('.signature-circle')) {
                    e.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('touchend', function(e) {
                if (e.target.tagName === 'IMG' || e.target.closest('.photo-frame') || 
                    e.target.closest('.photo-frame-mini') || e.target.closest('.signature-circle')) {
                    e.preventDefault();
                }
            }, { passive: false });

            // 6. Overlay gambar dengan canvas (opsional - lebih protektif)
            function protectImagesWithCanvas() {
                // Fungsi ini akan mengkonversi gambar ke canvas
                // Tapi karena kita ingin tetap mempertahankan tampilan asli,
                // kita akan menggunakan pendekatan lain
            }

            // 7. Bersihkan atribut src dari inspect element (tidak 100% efektif tapi membantu)
            setInterval(function() {
                // Periodic check untuk memastikan gambar tidak bisa diakses via inspect element
                // Tidak ada yang bisa dilakukan selain yang sudah kita lakukan
            }, 1000);

            // 8. Nonaktifkan copy
            document.addEventListener('copy', function(e) {
                if (e.target.tagName === 'IMG' || e.target.closest('.photo-frame') || 
                    e.target.closest('.photo-frame-mini') || e.target.closest('.signature-circle')) {
                    e.preventDefault();
                }
            });

            // 9. Nonaktifkan cut
            document.addEventListener('cut', function(e) {
                if (e.target.tagName === 'IMG' || e.target.closest('.photo-frame') || 
                    e.target.closest('.photo-frame-mini') || e.target.closest('.signature-circle')) {
                    e.preventDefault();
                }
            });

            // ========== KEMBANG API ==========
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            const body = document.getElementById('mainBody');
            const mainContainer = document.getElementById('mainContainer');
            const floatingHearts = document.getElementById('floatingHearts');
            
            let width, height;
            let particles = [];
            let animationFrame = null;
            let fireworksActive = true;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function random(min, max) {
                return Math.random() * (max - min) + min;
            }

            class Particle {
                constructor(x, y, color, vx, vy, size, life, shape = 'circle') {
                    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                    this.color = color; this.size = size; this.life = life; this.maxLife = life;
                    this.shape = shape;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.02;
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                    this.life -= 1;
                }

                draw(ctx) {
                    if (this.life <= 0) return;
                    const opacity = Math.min(1, this.life / this.maxLife);
                    ctx.globalAlpha = opacity;
                    
                    if (this.shape === 'heart' && this.size > 3) {
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.scale(this.size / 15, this.size / 15);
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.moveTo(0, 5);
                        ctx.bezierCurveTo(-5, -2, -10, -5, 0, -10);
                        ctx.bezierCurveTo(10, -5, 5, -2, 0, 5);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * (this.life / this.maxLife), 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }
                }
            }

            function createExplosion(x, y, count = 30) {
                for (let i = 0; i < count; i++) {
                    const angle = random(0, Math.PI * 2);
                    const speed = random(1, 5);
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const size = random(3, 8);
                    const life = random(60, 100);
                    const color = `hsl(${random(330, 20)}, 90%, 70%)`;
                    particles.push(new Particle(x, y, color, vx, vy, size, life, 'circle'));
                }
            }

            function createHeartExplosion(x, y) {
                for (let i = 0; i < 150; i++) {
                    const t = Math.random() * Math.PI * 2;
                    const scale = random(2, 5) * 3;
                    const xOffset = 16 * Math.pow(Math.sin(t), 3) * scale * 0.6;
                    const yOffset = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * scale * 0.6;
                    
                    const targetX = x + xOffset + random(-10, 10);
                    const targetY = y + yOffset + random(-10, 10);
                    
                    const dx = targetX - x;
                    const dy = targetY - y;
                    const dist = Math.hypot(dx, dy);
                    const speed = dist * 0.08;
                    
                    const vx = (dx / dist) * speed + random(-0.5, 0.5);
                    const vy = (dy / dist) * speed + random(-0.5, 0.5);
                    
                    const size = random(4, 10);
                    const life = random(130, 200);
                    const hue = random(330, 20);
                    const color = `hsl(${hue}, 100%, 65%)`;
                    const shape = (Math.random() < 0.3) ? 'heart' : 'circle';
                    
                    particles.push(new Particle(x, y, color, vx, vy, size, life, shape));
                }
            }

            function startFireworks() {
                setTimeout(() => { if (fireworksActive) createExplosion(width/2, height/2, 40); }, 200);
                setTimeout(() => { if (fireworksActive) createExplosion(width*0.3, height*0.4, 35); }, 600);
                setTimeout(() => { if (fireworksActive) createExplosion(width*0.7, height*0.6, 35); }, 1100);
                setTimeout(() => {
                    if (!fireworksActive) return;
                    for (let i = 0; i < 2; i++) {
                        setTimeout(() => {
                            createHeartExplosion(width/2 + random(-40,40), height/2 + random(-30,30));
                        }, i * 150);
                    }
                    setTimeout(() => {
                        createHeartExplosion(width/2, height/2 - 20);
                        createHeartExplosion(width/2 + 30, height/2 + 10);
                        createHeartExplosion(width/2 - 30, height/2 + 10);
                        
                        setTimeout(() => {
                            fireworksActive = false;
                            body.classList.remove('firework-bg');
                            body.classList.add('after-firework');
                            mainContainer.classList.add('show');
                            floatingHearts.classList.add('show');
                            canvas.style.transition = 'opacity 1.5s';
                            canvas.style.opacity = '0';
                            
                            // Putar musik
                            const bgMusic = document.getElementById('bg-music');
                            bgMusic.volume = 0.4;
                            bgMusic.loop = true;
                            
                            const playMusic = function() {
                                bgMusic.play()
                                    .then(() => {
                                        console.log('Musik berhasil diputar');
                                    })
                                    .catch(e => {
                                        console.log('Gagal memutar musik:', e);
                                        const retryInterval = setInterval(() => {
                                            bgMusic.play()
                                                .then(() => {
                                                    clearInterval(retryInterval);
                                                    console.log('Musik berhasil diputar setelah retry');
                                                })
                                                .catch(() => {});
                                        }, 500);
                                    });
                            };
                            
                            setTimeout(playMusic, 500);
                            
                            const playOnInteraction = function() {
                                bgMusic.play().catch(() => {});
                                document.body.removeEventListener('click', playOnInteraction);
                                document.body.removeEventListener('touchstart', playOnInteraction);
                            };
                            
                            document.body.addEventListener('click', playOnInteraction, { once: true });
                            document.body.addEventListener('touchstart', playOnInteraction, { once: true });
                            
                            setTimeout(() => { particles = []; }, 1500);
                        }, 1800);
                    }, 300);
                }, 2000);
            }

            function animate() {
                if (!fireworksActive && particles.length === 0) {
                    if (animationFrame) {
                        cancelAnimationFrame(animationFrame);
                        animationFrame = null;
                    }
                    return;
                }
                
                ctx.clearRect(0, 0, width, height);
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    if (p.life <= 0) particles.splice(i, 1);
                    else p.draw(ctx);
                }
                
                animationFrame = requestAnimationFrame(animate);
            }

            // ========== KONTEN HALAMAN ==========
            const contentArea = document.getElementById('contentArea');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageIndicator = document.getElementById('pageIndicator');
            
            let currentPage = 1;
            const totalPages = 6;

            // Semua konten halaman
            const pages = [
                // Halaman 1
                `
                    <div class="photo-frame">
                        <img src="cantik.jpg" alt="foto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="photo-placeholder" style="display:none;">📸<br>foto</div>
                    </div>
                    <div>
                        <span class="heart-icon">♥</span>
                        <span class="heart-icon">♥</span>
                        <span class="heart-icon">♥</span>
                    </div>
                    <h1>haloo cantikk!</h1>
                    <p style="max-width:90%; margin:0 auto;">cuma mau bilang, kamu itu cewe tercantik<br>yang paling aku cintai.</p>
                    <p><i>makasih ya dee sudah hadir di hidup aku.</i></p>
                `,
                // Halaman 2
                `
                    <h2>Untukmu,</h2>
                    <div class="poem">
                        "Di antara gelapnya malam,<br>
                        aku temukan wajahmu.<br>
                        Seperti cahaya yang tak pernah kulihat dimalam hari,<br>
                        kamu adalah yang menyinari gelapnya malamku."
                    </div>
                    <p style="margin:15px 0 5px; font-weight:bold;">semoga kita terus bersama sayang..</p>
                `,
                // Halaman 3
                `
                    <div class="photo-strip">
                        <div class="photo-item"><div class="photo-frame-mini"><img src="foto1.jpg" alt="foto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="photo-placeholder-mini" style="display:none;">📸</div></div><div class="caption-text"><p>senyummu begitu manis</p></div></div>
                        <div class="photo-item"><div class="photo-frame-mini"><img src="foto2.jpg" alt="foto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="photo-placeholder-mini" style="display:none;">📸</div></div><div class="caption-text"><p>langit saja kalah cantiknya dengan dirimu</p></div></div>

            function updatePage() {
                contentArea.innerHTML = pages[currentPage - 1];
                pageIndicator.textContent = `${currentPage} / ${totalPages}`;
                
                // Update tombol
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            }

            window.changePage = function(direction) {
                const newPage = currentPage + direction;
                if (newPage >= 1 && newPage <= totalPages) {
                    currentPage = newPage;
                    updatePage();
                }
            };

            // Initialize
            updatePage();

            // Start fireworks and animation
            animate();
            startFireworks();

            window.addEventListener('beforeunload', function() {
                if (animationFrame) cancelAnimationFrame(animationFrame);
            });
        })();
    </script>
